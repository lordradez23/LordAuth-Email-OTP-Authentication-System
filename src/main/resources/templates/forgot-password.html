<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LordAuth | Forgot Password</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-container">

        <div class="brand">
            <div class="brand-icon">🔑</div>
            <h1>LordAuth</h1>
            <p>Anointed Security System</p>
        </div>

        <!-- Success state -->
        <div th:if="${sent}" class="alert alert-success" style="text-align:center; justify-content:center;">
            <span>✅</span>
            <span>If that email is registered, a reset link has been sent. Check your inbox (valid for 15 minutes).</span>
        </div>

        <!-- Form state -->
        <div th:unless="${sent}">
            <h2 class="section-title">Reset Password</h2>
            <p class="subtitle">Enter your account email and we'll send a secure reset link.</p>

            <form action="/forgot-password" method="post" id="forgotForm">
                <div class="form-group">
                    <label for="emailId">Email Address</label>
                    <input type="email" id="emailId" name="emailId"
                           placeholder="you@example.com" required autocomplete="email">
                </div>

                <div class="alert">
                    <span>🔒</span>
                    <span>The reset link expires in <strong>15 minutes</strong> for your security.</span>
                </div>

                <button type="submit" class="btn-primary" id="resetBtn">
                    Send Reset Link
                </button>
            </form>
        </div>

        <!-- If already sent, show back button -->
        <div th:if="${sent}" style="margin-top:1.5rem;">
            <a href="/login">
                <button class="btn-secondary">Back to Login</button>
            </a>
        </div>

        <div class="link-group">
            Remembered it? <a href="/login">Sign in</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('forgotForm');
        const btn  = document.getElementById('resetBtn');
        if (form) {
            form.addEventListener('submit', () => {
                btn.innerHTML = '<span class="spinner"></span> Sending...';
                btn.disabled = true;
            });
        }
    </script>
</body>
</html>
