<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Home Page</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(120deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Main container */

.container{
    background:white;
    width:600px;
    padding:40px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
    animation:fadeIn 1s ease-in;
}

/* Title */

h2{
    color:#333;
    margin-bottom:20px;
}

/* Description */

p{
    color:#666;
    margin-bottom:30px;
}

/* Buttons */

.btn{
    display:inline-block;
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:6px;
    background:#4facfe;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

/* Hover animation */

.btn:hover{
    background:#007bff;
    transform:scale(1.05);
}

/* Card section */

.cards{
    display:flex;
    justify-content:space-around;
    margin-top:30px;
}

.card{
    background:#f5f5f5;
    padding:20px;
    width:150px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 8px 18px rgba(0,0,0,0.2);
}

/* Animation */

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<div class="container">

<h2>Welcome to the Application 🎉</h2>

<p>You have successfully logged in using OTP Authentication.</p>

<button class="btn">View Profile</button>
<button class="btn">Dashboard</button>
<button class="btn">Logout</button>

<div class="cards">

<div class="card">
<h3>Users</h3>
<p>Manage Users</p>
</div>

<div class="card">
<h3>Security</h3>
<p>OTP System</p>
</div>

<div class="card">
<h3>Settings</h3>
<p>App Config</p>
</div>

</div>

</div>

</body>
</html>
