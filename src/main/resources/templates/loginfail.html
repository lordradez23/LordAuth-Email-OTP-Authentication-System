<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LordAuth | Access Denied</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-container" style="text-align:center;">

        <div class="brand">
            <div class="brand-icon">🛡️</div>
            <h1>LordAuth</h1>
        </div>

        <div class="status-icon icon-danger" id="errorIcon">⚠️</div>

        <h2 class="section-title">Access Denied</h2>
        <p class="subtitle" id="errorMsg">
            Invalid credentials or OTP. Please check your details and try again.
        </p>

        <div class="alert alert-danger">
            <span>🔐</span>
            <span>Multiple failed attempts may result in a temporary account lockout for your security.</span>
        </div>

        <a href="/login">
            <button class="btn-primary" style="margin-bottom:0.75rem;">Try Again</button>
        </a>
        <a href="/">
            <button class="btn-secondary">Create New Account</button>
        </a>

        <div class="link-group">
            Lost access? <a href="/forgot-password">Reset your password</a>
        </div>
    </div>
</body>
</html>
